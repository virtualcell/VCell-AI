apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/virtualcell/vcell-ai-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          # Non-secret configuration (Azure endpoint/deployment names, Qdrant
          # URL, Auth0 domain/audience, Langfuse host, ...) comes from the
          # backend-config ConfigMap generated per-environment in config/.
          envFrom:
            - configMapRef:
                name: backend-config
          # Secret values come from the sealed "backend-secrets" secret,
          # generated per-overlay by scripts/sealed_secret_backend.sh.
          env:
            - name: AZURE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: azure-api-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: langfuse-secret-key
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: langfuse-public-key
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: supabase-service-role-key
            # Backend provisions per-user LiteLLM virtual keys using the master key.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: litellm-master-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
      imagePullSecrets:
        - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  ports:
    - name: "8000"
      port: 8000
      targetPort: 8000
  selector:
    app: backend
