# In-cluster Ollama, serving the "local-model" fallback that LiteLLM routes to
# when the primary (openai-model) fails. CPU inference — no GPU is assumed on the
# node; phi4-mini (~3.8B) is small enough to respond acceptably on CPU. The model
# is pulled on startup into the PVC so it survives restarts.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
          # Start the server, then pull the model in the background so it lands
          # in the mounted PVC (idempotent — a no-op once cached).
          command: ["/bin/sh", "-c"]
          args:
            - |
              ollama serve &
              pid=$!
              sleep 5
              ollama pull "${OLLAMA_PULL_MODEL}" || echo "model pull failed; will retry on demand"
              wait $pid
          env:
            - name: OLLAMA_PULL_MODEL
              value: "phi4-mini"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "3Gi"
              cpu: "500m"
            limits:
              memory: "6Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
  volumeClaimTemplates:
    - metadata:
        name: ollama-models
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  ports:
    - name: http
      port: 11434
      targetPort: 11434
  selector:
    app: ollama
