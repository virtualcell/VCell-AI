apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vcell-ai-rke-dev

images:
  - name: ghcr.io/virtualcell/vcell-ai-backend
    newTag: latest
  - name: ghcr.io/virtualcell/vcell-ai-frontend
    newTag: latest

replicas:
  - count: 1
    name: backend
  - count: 1
    name: frontend

resources:
  - ingress.yaml
  # Sealed secrets — generated by ./secrets.sh (see README). Gitignored; run
  # secrets.sh before `kubectl apply -k` so these exist.
  - secret-backend.yaml
  - secret-frontend.yaml
  - secret-ghcr.yaml
  - ../../config/vcell-ai-rke-dev
  - ../../base
